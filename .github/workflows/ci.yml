name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          find . -name '*.sh' -not -path './.git/*' -print0 | xargs -0 shellcheck --severity=warning

  validate-skill-md:
    name: validate SKILL.md frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check SKILL.md exists and has required frontmatter keys
        run: |
          set -e
          for f in $(find skills -name 'SKILL.md'); do
            echo "Checking $f"
            head -1 "$f" | grep -q '^---$' || { echo "Missing opening ---"; exit 1; }
            grep -q '^name:' "$f" || { echo "Missing name:"; exit 1; }
            grep -q '^description:' "$f" || { echo "Missing description:"; exit 1; }
          done
          echo "All SKILL.md files validated."

  scanner-regression:
    name: scanner regression (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Run scanner regression suite
        run: bash skills/skill-triage/scripts/__tests__/test_scanner.sh

  scanner-regression-bash32:
    # macOS system /bin/bash is bash 3.2. Catches any bash-4+ syntax that
    # slipped into scanner or tests (mapfile, declare -A, ${var,,}, etc.).
    name: scanner regression (macOS /bin/bash 3.2)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Confirm bash 3.2
        run: /bin/bash --version
      - name: Run regression with /bin/bash
        run: /bin/bash skills/skill-triage/scripts/__tests__/test_scanner.sh

  scanner-regression-alpine:
    # Alpine ships BusyBox find/awk/stat/xargs and BusyBox sed by default.
    # Validates that nothing relies on GNU-only or BSD-only extensions.
    name: scanner regression (alpine + busybox)
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - name: Install bash + git (alpine has neither by default)
        run: apk add --no-cache bash git
      - uses: actions/checkout@v5
      - name: Run regression with bash + busybox toolchain
        run: bash skills/skill-triage/scripts/__tests__/test_scanner.sh
